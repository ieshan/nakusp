services:
  test:
    image: golang:1.26.4-trixie
    working_dir: /app
    volumes:
      - "./:/app"
    networks:
      - nakusp-network
    depends_on:
      - redis
    command:
      - "sh"
      - "-c"
      - "rm -f go.work go.work.sum && go work init . ./transports/redis ./transports/sqlite && go mod download && go test -v ./..."
    stop_signal: SIGINT
    environment:
      REDIS_URI: "redis://redis:6379/0"
  redis:
    image: redis:8.8.0-alpine3.23
    restart: always
    networks:
      - nakusp-network
networks:
  nakusp-network:
    driver: bridge

